<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>米米故事機</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        h1 { color: #ff6b6b; margin-bottom: 20px; }
        
        /* 登入畫面 */
        #loginScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        input[type="text"] {
            font-size: 24px;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #ccc;
            text-align: center;
            width: 60%;
            margin-bottom: 20px;
        }
        #loginBtn {
            background-color: #4CAF50;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 30px;
            border: 5px solid #388E3C;
            cursor: pointer;
        }
        
        /* 故事機主要畫面 */
        #mainScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        #greetingText {
            font-size: 22px;
            color: #2196F3;
            font-weight: bold;
            margin-bottom: 20px;
        }
        input[type="file"] { display: none; }
        .camera-btn {
            background-color: #ffcc00;
            color: #333;
            font-size: 24px;
            font-weight: bold;
            padding: 40px 60px;
            border-radius: 50px;
            border: 5px solid #ff9900;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .camera-btn:active { transform: scale(0.95); }
        
        #playBtn {
            background-color: #4CAF50;
            color: white;
            border: 5px solid #388E3C;
            display: none;
            margin-top: 20px;
        }
        
        #retryLoginBtn {
            background-color: #FF9800;
            color: white;
            border: 5px solid #F57C00;
            display: none;
            margin-top: 20px;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
        #preview {
            margin-top: 20px;
            max-width: 80%;
            max-height: 200px;
            border-radius: 15px;
            display: none;
            border: 3px dashed #ccc;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1>🔐 米米故事機</h1>
        <div style="font-size: 18px; color: #555; margin-bottom: 10px; font-weight: bold;">請輸入今天的通關密語：</div>
        <input type="text" id="passwordInput" placeholder="輸入密碼">
        <button id="loginBtn">進入魔法相機</button>
    </div>

    <div id="mainScreen">
        <h1>📸 米米故事機</h1>
        <div id="greetingText"></div>

        <label for="cameraInput" id="cameraLabel" class="camera-btn">按我拍照！</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <img id="preview" src="" alt="照片預覽">
        <div id="status">準備好聽故事了嗎？</div>
        
        <button id="playBtn" class="camera-btn">▶️ 點我聽故事</button>
        <button id="retryLoginBtn" class="camera-btn">🔄 重新輸入密碼</button>
    </div>

    <script>
        // ==========================================
        // 🛠️ 爸爸專用設定區 🛠️
        // ==========================================
        const N8N_WEBHOOK_URL = 'https://james15211521.zeabur.app/webhook/story-camera';
        
        const MAX_STORIES = 5;       // 短時間內最多可以聽幾個故事
        const COOLDOWN_HOURS = 3;    // 聽滿後，需要休息幾個小時才能再聽
        // ==========================================

        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const greetingText = document.getElementById('greetingText');

        // 檢查是否登入過
        function checkLogin() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('loginDate');
            const savedPwd = localStorage.getItem('magicPassword');

            if (savedDate === today && savedPwd) {
                showMainScreen();
            }
        }

        loginBtn.addEventListener('click', function() {
            const pwd = passwordInput.value.trim();
            if (pwd !== '') {
                localStorage.setItem('magicPassword', pwd);
                localStorage.setItem('loginDate', new Date().toDateString());
                showMainScreen();
            }
        });

        function showMainScreen() {
            loginScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            greetingText.innerText = `👋 嗨！準備好拍神奇的照片了嗎？`; 
        }

        checkLogin();

        // --- 拍照與發送邏輯 ---
        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const statusText = document.getElementById('status');
        const previewImg = document.getElementById('preview');
        const playBtn = document.getElementById('playBtn');
        const retryLoginBtn = document.getElementById('retryLoginBtn'); 
        const audioPlayer = new Audio();

        // ⭐️ 攔截點：在打開相機「之前」，先檢查額度跟時間！
        cameraInput.addEventListener('click', function(event) {
            const now = Date.now();
            let cooldownUntil = parseInt(localStorage.getItem('mimi_cooldownUntil')) || 0;
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            let lastStoryTime = parseInt(localStorage.getItem('mimi_lastStoryTime')) || 0;

            // 規則一：如果距離上一次聽故事已經超過休息時間，自動把額度補滿 (重置歸零)
            if (lastStoryTime > 0 && (now - lastStoryTime) > (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                storyCount = 0;
                cooldownUntil = 0;
                localStorage.setItem('mimi_storyCount', 0);
                localStorage.setItem('mimi_cooldownUntil', 0);
            }

            // 規則二：檢查是否正在「強制休息」狀態中
            if (cooldownUntil > 0 && now < cooldownUntil) {
                event.preventDefault(); // 阻止相機開啟
                const remainingMs = cooldownUntil - now;
                const hours = Math.floor(remainingMs / (1000 * 60 * 60));
                const mins = Math.ceil((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                
                let timeMsg = hours > 0 ? `${hours} 小時 ${mins} 分鐘` : `${mins} 分鐘`;
                statusText.innerHTML = `😴 <b>魔法精靈睡午覺囉！</b><br>請等 ${timeMsg} 後再來找我玩喔！`;
                statusText.style.color = '#FF9800';
                return;
            }

            // 規則三：檢查今天是否已經聽滿額度
            if (storyCount >= MAX_STORIES) {
                event.preventDefault(); // 阻止相機開啟
                // 觸發休息時間，開始倒數
                const newCooldown = now + (COOLDOWN_HOURS * 60 * 60 * 1000);
                localStorage.setItem('mimi_cooldownUntil', newCooldown);
                
                statusText.innerHTML = `✨ <b>已經聽完 ${MAX_STORIES} 個故事囉！</b><br>魔法精靈要去休息 ${COOLDOWN_HOURS} 小時了，晚點再來吧！掰掰！`;
                statusText.style.color = '#FF9800';
                return;
            }
        });

        cameraInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            cameraLabel.style.display = 'none';
            playBtn.style.display = 'none';
            retryLoginBtn.style.display = 'none'; 
            statusText.innerText = '✨ 魔法精靈正在確認通關密語...';
            statusText.style.color = '#555';

            const formData = new FormData();
            formData.append('data', file); 
            formData.append('password', localStorage.getItem('magicPassword')); 

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // ⭐️ 成功拿到故事後，才扣除額度
                    let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
                    storyCount++;
                    localStorage.setItem('mimi_storyCount', storyCount);
                    localStorage.setItem('mimi_lastStoryTime', Date.now());

                    const remaining = MAX_STORIES - storyCount;
                    statusText.innerText = `✅ 故事寫好囉！(本次還能再聽 ${remaining} 個)`;
                    statusText.style.color = '#4CAF50';
                    
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioUrl;
                    playBtn.style.display = 'block';
                } else {
                    statusText.innerText = '❌ 通關密語不對喔！請重新登入。';
                    statusText.style.color = 'red';
                    localStorage.removeItem('magicPassword');
                    localStorage.removeItem('loginDate');
                    
                    cameraLabel.style.display = 'none';
                    retryLoginBtn.style.display = 'block';
                }
            } catch (error) {
                statusText.innerText = '❌ 網路斷線了，請爸爸幫忙檢查一下！';
                statusText.style.color = 'red';
                cameraLabel.style.display = 'block';
            }
        });

        retryLoginBtn.addEventListener('click', function() {
            mainScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            
            retryLoginBtn.style.display = 'none';
            cameraLabel.style.display = 'block';
            statusText.innerText = '準備好聽故事了嗎？';
            statusText.style.color = '#555';
            previewImg.style.display = 'none';
            passwordInput.value = ''; 
        });

        playBtn.addEventListener('click', function() {
            audioPlayer.play();
            playBtn.style.display = 'none'; 
            statusText.innerText = '🎶 故事播放中...';
            statusText.style.color = '#2196F3';
        });

        audioPlayer.onended = function() {
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            if (storyCount >= MAX_STORIES) {
                statusText.innerHTML = `🎉 <b>故事說完啦！</b><br>你已經聽滿 ${MAX_STORIES} 個囉，請按下面的按鈕讓精靈去睡覺！`;
            } else {
                statusText.innerText = '🎉 故事說完啦！還要再拍一張嗎？';
            }
            statusText.style.color = '#ff6b6b';
            cameraLabel.style.display = 'block'; 
            previewImg.style.display = 'none';
        };
    </script>
</body>
</html>
