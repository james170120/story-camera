<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法照片故事機</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 引入可愛圓潤且豐富的 Google 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Playfair+Display:wght@700;900&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: url('whimsical_sky.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Nunito', 'Arial', sans-serif;
            overflow: hidden; /* 確保內容超出螢幕時不出現滾動條 */
        }
        
        /* === 👉 標題：深紅色故事書標籤框 === */
        .fairytale-tag {
            background-color: #d63031; 
            border: 4px solid #f9ca24; 
            border-radius: 10px;
            padding: 8px 20px; /* 稍微縮小內距 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px; /* 減少底部邊距，讓出空間 */
            position: relative; 
            z-index: 10; /* 確保標題在最上層 */
        }
        
        .fairytale-tag::before, .fairytale-tag::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            border: 4px solid #f9ca24;
            border-bottom: none; border-right: none;
            top: 4px; left: 4px;
        }
        .fairytale-tag::after {
            border-top: none; border-left: none;
            border-bottom: 4px solid #f9ca24; border-right: 4px solid #f9ca24;
            bottom: 4px; right: 4px; top: auto; left: auto;
        }

        h1 { 
            color: white; 
            margin: 0; 
            text-shadow: 2px 2px 0px #8e1b1b, 0px 0px 10px white; 
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 28px; /* 稍微縮小標題字體 */
        }
        
        /* 登入畫面 */
        #loginScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(240, 248, 255, 0.9); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        input[type="text"] {
            font-size: 24px;
            padding: 15px;
            border-radius: 15px;
            border: 4px solid #f3a683; 
            text-align: center;
            width: 60%;
            margin-bottom: 20px;
            background-color: white;
            color: #333;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
        }
        
        /* === 👉 童話風圖章按鈕基础設定 === */
        .story-stamp {
            color: white;
            font-size: 24px;
            font-weight: 900;
            padding: 20px 40px; 
            border-radius: 50px; 
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            font-family: 'Nunito', sans-serif;
            border: 6px solid #e2af65; 
            box-shadow: 0 4px 0 #b07d3f, 0 8px 15px rgba(0,0,0,0.2);
        }
        .story-stamp:active { 
            transform: scale(0.95) translateY(4px); 
            box-shadow: 0 0px 0 #b07d3f !important;
        }

        /* 登入頁面中央 Parchment 框 */
        .parchment-box {
            background: #f7e8c3; 
            border: 3px solid #a3815f; 
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* 拍照按鈕 (超大正圓形相機圖案) */
        #cameraLabel {
            background: linear-gradient(180deg, #f6e58d 0%, #f9ca24 100%);
            display: block;      /* ⭐️ 改成 block，不用 flex 了 */
            position: relative;  /* ⭐️ 加上相對定位，當作相機圖案的基準點 */
            width: 120px;        
            height: 120px;
            padding: 0;          
            border-radius: 50%;  
            font-size: 0px;      
            margin-top: 10px; 
            -webkit-tap-highlight-color: transparent; /* ⭐️ 關掉手機點擊時的預設灰色反白 */
            user-select: none;   /* ⭐️ 防止圖案被當成文字選取 */
            -webkit-user-select: none;
        }
        #cameraLabel::after {
            content: '📸';       
            position: absolute;  /* ⭐️ 絕對定位，釘死在中央 */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* ⭐️ 完美置中魔法 */
            font-size: 60px;     
            line-height: 1;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2); 
        }
        
        /* 播放按鈕 (藍色系) */
        #playBtn {
            background: linear-gradient(180deg, #82ccdd 0%, #60a3bc 100%);
            border: 6px solid #e2af65; 
            display: none;
            margin-top: 15px; /* 減少上方距離 */
        }
        
        /* 重新登入按鈕 (紅色系) */
        #retryLoginBtn {
            background: linear-gradient(180deg, #fab1a0 0%, #e17055 100%);
            border: 6px solid #e2af65; 
            display: none;
            margin-top: 15px; /* 減少上方距離 */
        }

        /* 主要畫面 */
        #mainScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* ⭐️ 重要：讓內容從上方開始排，不要全部擠在中間 */
            padding-top: 30px; /* 給最上方留一點呼吸空間 */
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
        }
        
        /* === 👉 修正：羊皮紙問候語「瘦身」 === */
        #greetingText {
            font-size: 20px; /* ⭐️ 字體縮小 */
            color: #1a4d70; 
            font-weight: 900;
            margin-bottom: 15px; /* ⭐️ 減少底部邊距 */
            background-image: url('parchment_seal.png'); 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            padding: 45px 40px; /* ⭐️ 減少上下內距，讓羊皮紙變矮 */
            text-align: center;
            line-height: 1.4;
            font-family: 'Baloo 2', 'Nunito', sans-serif;
            width: 85%; 
            box-sizing: border-box; 
        }
        
        input[type="file"] { display: none; }

        /* === 👉 修正：狀態欄「瘦身」 === */
        #status {
            margin-top: 15px; /* ⭐️ 減少頂部距離 */
            font-size: 18px; /* ⭐️ 字體縮小 */
            color: #333;
            font-weight: bold;
            text-align: center;
            padding: 10px 20px; /* ⭐️ 減少內距 */
            line-height: 1.4;
            background-color: rgba(255, 255, 255, 0.85); 
            border-radius: 15px;
            border: 3px dashed #f3a683; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-family: 'Baloo 2', 'Nunito', sans-serif;
            max-width: 90%; /* 避免太寬 */
        }

        /* 預覽照片 */
        #preview {
            margin-top: 10px; /* 減少與上面元素的距離 */
            max-width: 70%; /* 稍微縮小照片預覽的寬度，節省高度空間 */
            max-height: 180px; /* 限制照片最大高度 */
            border-radius: 15px;
            display: none;
            border: 5px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="fairytale-tag">
            <h1>🔐 魔法照片故事機</h1>
        </div>
        <div class="parchment-box login-box">
            <div style="font-size: 20px; color: #e17055; margin-bottom: 15px; font-weight: 900;">請輸入今天的魔法咒語：</div>
            <input type="text" id="passwordInput" placeholder="輸入咒語">
            <button id="loginBtn" class="story-stamp">進入魔法相機</button>
        </div>
    </div>

    <div id="mainScreen">
        <div class="fairytale-tag">
            <h1>📸 魔法照片故事機</h1>
        </div>
        <div id="greetingText"></div>
        <label for="cameraInput" id="cameraLabel" class="camera-btn story-stamp">按我拍照！</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <img id="preview" src="" alt="照片預覽">
        
        <div id="status">一起來聽故事吧！</div>
        
        <button id="playBtn" class="camera-btn story-stamp">▶️ 點我聽故事</button>
        <button id="retryLoginBtn" class="camera-btn story-stamp">🔄 重新輸入魔法咒語</button>
    </div>

    <script>
        // ==========================================
        // 🛠️ 爸爸專用設定區 🛠️ (請勿移除)
        // ==========================================
        const N8N_WEBHOOK_URL = 'https://james15211521.zeabur.app/webhook/story-camera';
        
        const MAX_STORIES = 5;       // 短時間內最多可以聽幾個故事
        const COOLDOWN_HOURS = 3;    // 聽滿後，需要休息幾個小時才能再聽
        // ==========================================

        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const greetingText = document.getElementById('greetingText');

        // 檢查是否登入過
        function checkLogin() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('loginDate');
            const savedPwd = localStorage.getItem('magicPassword');

            if (savedDate === today && savedPwd) {
                showMainScreen();
            }
        }

        loginBtn.addEventListener('click', function() {
            const pwd = passwordInput.value.trim();
            if (pwd !== '') {
                localStorage.setItem('magicPassword', pwd);
                localStorage.setItem('loginDate', new Date().toDateString());
                showMainScreen();
            }
        });

        function showMainScreen() {
            loginScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            
            // ⭐️ 修正：從 innerText 改為 innerHTML，並加入 <br> 換行
            greetingText.innerHTML = `💥魔法提示💥<br>找到你有興趣的東西<br>按下照相機📸把他拍下來吧`; 
        } // ⭐️ 修正：刪除了多餘的右括號

        checkLogin();

        // --- 拍照與發送邏輯 ---
        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const statusText = document.getElementById('status');
        const previewImg = document.getElementById('preview');
        const playBtn = document.getElementById('playBtn');
        const retryLoginBtn = document.getElementById('retryLoginBtn'); 
        const audioPlayer = new Audio();

        // 防沉迷檢查
        cameraInput.addEventListener('click', function(event) {
            const now = Date.now();
            let cooldownUntil = parseInt(localStorage.getItem('mimi_cooldownUntil')) || 0;
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            let lastStoryTime = parseInt(localStorage.getItem('mimi_lastStoryTime')) || 0;

            if (lastStoryTime > 0 && (now - lastStoryTime) > (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                storyCount = 0;
                cooldownUntil = 0;
                localStorage.setItem('mimi_storyCount', 0);
                localStorage.setItem('mimi_cooldownUntil', 0);
            }

            if (cooldownUntil > 0 && now < cooldownUntil) {
                event.preventDefault(); 
                const remainingMs = cooldownUntil - now;
                
                // ⭐️ 修正：更精準的時間計算，避免出現「60 分鐘」
                const totalMins = Math.ceil(remainingMs / (1000 * 60));
                const hours = Math.floor(totalMins / 60);
                const mins = totalMins % 60;
                
                let timeMsg = hours > 0 ? `${hours} 小時 ${mins} 分鐘` : `${mins} 分鐘`;
                statusText.innerHTML = `😴 <b>魔法精靈睡覺補充能量中！</b><br>請等 ${timeMsg} 後再來找我玩喔！`;
                statusText.style.color = '#e17055';
                return;
            }
            }

            if (storyCount >= MAX_STORIES) {
                event.preventDefault(); 
                const newCooldown = now + (COOLDOWN_HOURS * 60 * 60 * 1000);
                localStorage.setItem('mimi_cooldownUntil', newCooldown);
                
                statusText.innerHTML = `✨ <b>已經聽完 ${MAX_STORIES} 個故事囉！</b><br>魔法精靈要去休息 ${COOLDOWN_HOURS} 小時了，晚點再來吧！掰掰！`;
                statusText.style.color = '#e17055';
                return;
            }
        });

        cameraInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            cameraLabel.style.display = 'none';
            playBtn.style.display = 'none';
            retryLoginBtn.style.display = 'none'; 
            statusText.innerText = '✨ 魔法精靈正在確認通關密語...';
            statusText.style.color = '#555';

            const formData = new FormData();
            formData.append('data', file); 
            formData.append('password', localStorage.getItem('magicPassword')); 

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
                    storyCount++;
                    localStorage.setItem('mimi_storyCount', storyCount);
                    localStorage.setItem('mimi_lastStoryTime', Date.now());

                    const remaining = MAX_STORIES - storyCount;
                    statusText.innerText = `✅ 故事寫好囉！(本次還能再聽 ${remaining} 個)`;
                    statusText.style.color = '#38ada9';
                    
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioUrl;
                    playBtn.style.display = 'block';
                } else {
                    statusText.innerText = '❌ 魔法咒語不對喔！請重新施展嘿。';
                    statusText.style.color = '#d63031';
                    localStorage.removeItem('magicPassword');
                    localStorage.removeItem('loginDate');
                    
                    cameraLabel.style.display = 'none';
                    retryLoginBtn.style.display = 'block';
                }
            } catch (error) {
                statusText.innerText = '❌ 咦~網路斷線了捏，快請爸爸幫忙檢查一下！';
                statusText.style.color = '#d63031';
                cameraLabel.style.display = 'block';
            }
        });

        retryLoginBtn.addEventListener('click', function() {
            mainScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            
            retryLoginBtn.style.display = 'none';
            cameraLabel.style.display = 'block';
            statusText.innerText = '準備好聽故事了嗎？';
            statusText.style.color = '#555';
            previewImg.style.display = 'none';
            passwordInput.value = ''; 
        });

        playBtn.addEventListener('click', function() {
            audioPlayer.play();
            playBtn.style.display = 'none'; 
            statusText.innerText = '🎶 故事播放中...';
            statusText.style.color = '#38ada9';
        });

        audioPlayer.onended = function() {
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            // ⭐️ 修正：🎉 故事說完啦！
            if (storyCount >= MAX_STORIES) {
                statusText.innerHTML = `🎉 <b>故事說完啦！</b><br>你已經聽滿 ${MAX_STORIES} 個囉，請讓精靈去睡覺補充能量吧！`;
            } else {
                statusText.innerText = '🎉 故事說完啦！還要再拍一張嗎？';
            }
            statusText.style.color = '#ff6b6b';
            cameraLabel.style.display = 'block'; 
            previewImg.style.display = 'none';
        };
    </script>
    
    </body>
</html>
