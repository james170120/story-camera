<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>米米故事機</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Arial', sans-serif;
        }
        h1 {
            color: #ff6b6b;
            margin-bottom: 30px;
        }
        input[type="file"] {
            display: none;
        }
        .camera-btn {
            background-color: #ffcc00;
            color: #333;
            font-size: 24px;
            font-weight: bold;
            padding: 40px 60px;
            border-radius: 50px;
            border: 5px solid #ff9900;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .camera-btn:active {
            transform: scale(0.95);
        }
        /* 新增的播放按鈕樣式，顏色稍微不一樣做區隔 */
        #playBtn {
            background-color: #4CAF50;
            color: white;
            border: 5px solid #388E3C;
            display: none; /* 預設隱藏，故事來了才顯示 */
            margin-top: 20px;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }
        #preview {
            margin-top: 20px;
            max-width: 80%;
            max-height: 200px;
            border-radius: 15px;
            display: none;
            border: 3px dashed #ccc;
        }
    </style>
</head>
<body>

    <h1>📸 米米故事機</h1>

    <label for="cameraInput" id="cameraLabel" class="camera-btn">按我拍照！</label>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">

    <img id="preview" src="" alt="照片預覽">
    <div id="status">準備好聽故事了嗎？</div>

    <button id="playBtn" class="camera-btn">▶️ 點我聽故事</button>

    <script>
        const N8N_WEBHOOK_URL = 'https://james15211521.zeabur.app/webhook/story-camera';

        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const statusText = document.getElementById('status');
        const previewImg = document.getElementById('preview');
        const playBtn = document.getElementById('playBtn');

        const audioPlayer = new Audio();

        cameraInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 顯示預覽圖，隱藏拍照按鈕，避免重複按
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            cameraLabel.style.display = 'none';
            playBtn.style.display = 'none';
            statusText.innerText = '✨ 魔法精靈正在寫故事，請等一下喔...';
            statusText.style.color = '#555';

            const formData = new FormData();
            formData.append('data', file); 

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusText.innerText = '✅ 故事寫好囉！';
                    statusText.style.color = '#4CAF50';
                    
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioUrl;
                    
                    // 故事準備好了，秀出播放按鈕讓孩子按！
                    playBtn.style.display = 'block';

                } else {
                    statusText.innerText = '❌ 哎呀，魔法精靈迷路了，再拍一次好嗎？';
                    statusText.style.color = 'red';
                    cameraLabel.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                statusText.innerText = '❌ 網路好像斷線了，請爸爸幫忙檢查一下！';
                statusText.style.color = 'red';
                cameraLabel.style.display = 'block';
            }
        });

        // 綁定播放按鈕的事件
        playBtn.addEventListener('click', function() {
            audioPlayer.play();
            playBtn.style.display = 'none'; // 按下後隱藏播放按鈕
            statusText.innerText = '🎶 故事播放中...';
            statusText.style.color = '#2196F3';
        });

        audioPlayer.onended = function() {
            statusText.innerText = '🎉 故事說完啦！還要再拍一張嗎？';
            statusText.style.color = '#ff6b6b';
            cameraLabel.style.display = 'block'; // 重新顯示拍照按鈕
            previewImg.style.display = 'none';
        };

    </script>
</body>
</html>
