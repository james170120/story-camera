<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法照片故事機</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 引入可愛圓潤的 Google 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff9e6; /* 換成溫暖的鵝黃色底，更有繪本感 */
            font-family: 'Nunito', 'Arial', sans-serif;
            overflow: hidden;
        }
        h1 { 
            color: #ff6b6b; 
            margin-bottom: 20px; 
            text-shadow: 2px 2px 0px #ffeaa7; /* 加上可愛的文字陰影 */
            font-size: 36px;
        }
        
        /* 登入畫面 */
        #loginScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #fff9e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        input[type="text"] {
            font-size: 24px;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #f3a683; /* 邊框加粗變可愛 */
            text-align: center;
            width: 60%;
            margin-bottom: 20px;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            color: #555;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }

        /* 童話風立體按鈕的基礎設定 */
        .camera-btn, #loginBtn {
            color: white;
            font-size: 24px;
            font-weight: 900;
            padding: 20px 40px; /* 調整比例讓它更圓潤 */
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            font-family: 'Nunito', sans-serif;
        }
        
        /* 按下去的動態回饋 */
        .camera-btn:active, #loginBtn:active { 
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2) !important;
        }

        /* 個別按鈕的配色：登入按鈕 (綠色系) */
        #loginBtn {
            background: linear-gradient(180deg, #78e08f 0%, #38ada9 100%);
            border: 4px solid #079992;
            box-shadow: 0 8px 0 #079992, 0 15px 20px rgba(0,0,0,0.2);
        }
        
        /* 個別按鈕的配色：拍照按鈕 (黃橘色系) */
        #cameraLabel {
            background: linear-gradient(180deg, #f6e58d 0%, #f9ca24 100%);
            border: 4px solid #f0932b;
            box-shadow: 0 8px 0 #f0932b, 0 15px 20px rgba(0,0,0,0.2);
            color: #d35400; /* 為了對比好，文字用深橘色 */
            text-shadow: 1px 1px 0px #fff;
        }
        
        /* 個別按鈕的配色：播放按鈕 (藍色系) */
        #playBtn {
            background: linear-gradient(180deg, #82ccdd 0%, #60a3bc 100%);
            border: 4px solid #3c6382;
            box-shadow: 0 8px 0 #3c6382, 0 15px 20px rgba(0,0,0,0.2);
            display: none;
            margin-top: 20px;
        }
        
        /* 個別按鈕的配色：重新登入按鈕 (橘紅色系) */
        #retryLoginBtn {
            background: linear-gradient(180deg, #fab1a0 0%, #e17055 100%);
            border: 4px solid #d63031;
            box-shadow: 0 8px 0 #d63031, 0 15px 20px rgba(0,0,0,0.2);
            display: none;
            margin-top: 20px;
        }

        /* 故事機主要畫面 */
        #mainScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        #greetingText {
            font-size: 26px;
            color: #38ada9;
            font-weight: 900;
            margin-bottom: 25px;
            text-shadow: 1px 1px 0px #fff;
        }
        input[type="file"] { display: none; }

        #status {
            margin-top: 30px;
            font-size: 20px;
            color: #555;
            font-weight: bold;
            text-align: center;
            padding: 15px 25px;
            line-height: 1.5;
            background-color: white;
            border-radius: 20px;
            border: 3px dashed #f3a683; /* 加個可愛的虛線框 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #preview {
            margin-top: 20px;
            max-width: 80%;
            max-height: 200px;
            border-radius: 20px;
            display: none;
            border: 5px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1>🔐 魔法照片故事機</h1>
        <div style="font-size: 20px; color: #e17055; margin-bottom: 15px; font-weight: 900;">請輸入今天的魔法咒語：</div>
        <input type="text" id="passwordInput" placeholder="輸入咒語">
        <button id="loginBtn">進入魔法相機</button>
    </div>

    <div id="mainScreen">
        <h1>📸 魔法照片故事機</h1>
        <div id="greetingText"></div>

        <label for="cameraInput" id="cameraLabel" class="camera-btn">按我拍照！</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <img id="preview" src="" alt="照片預覽">
        <div id="status">準備好聽故事了嗎？</div>
        
        <button id="playBtn" class="camera-btn">▶️ 點我聽故事</button>
        <button id="retryLoginBtn" class="camera-btn">🔄 重新輸入魔法咒語</button>
    </div>

    <script>
        // ==========================================
        // 🛠️ 爸爸專用設定區 🛠️
        // ==========================================
        const N8N_WEBHOOK_URL = 'https://james15211521.zeabur.app/webhook/story-camera';
        
        const MAX_STORIES = 5;       // 短時間內最多可以聽幾個故事
        const COOLDOWN_HOURS = 3;    // 聽滿後，需要休息幾個小時才能再聽
        // ==========================================

        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const greetingText = document.getElementById('greetingText');

        // 檢查是否登入過
        function checkLogin() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('loginDate');
            const savedPwd = localStorage.getItem('magicPassword');

            if (savedDate === today && savedPwd) {
                showMainScreen();
            }
        }

        loginBtn.addEventListener('click', function() {
            const pwd = passwordInput.value.trim();
            if (pwd !== '') {
                localStorage.setItem('magicPassword', pwd);
                localStorage.setItem('loginDate', new Date().toDateString());
                showMainScreen();
            }
        });

        function showMainScreen() {
            loginScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            greetingText.innerText = `👋 嗨！準備好拍神奇的照片了嗎？`; 
        }

        checkLogin();

        // --- 拍照與發送邏輯 ---
        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const statusText = document.getElementById('status');
        const previewImg = document.getElementById('preview');
        const playBtn = document.getElementById('playBtn');
        const retryLoginBtn = document.getElementById('retryLoginBtn'); 
        const audioPlayer = new Audio();

        // ⭐️ 攔截點：在打開相機「之前」，先檢查額度跟時間！
        cameraInput.addEventListener('click', function(event) {
            const now = Date.now();
            let cooldownUntil = parseInt(localStorage.getItem('mimi_cooldownUntil')) || 0;
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            let lastStoryTime = parseInt(localStorage.getItem('mimi_lastStoryTime')) || 0;

            // 規則一：如果距離上一次聽故事已經超過休息時間，自動把額度補滿 (重置歸零)
            if (lastStoryTime > 0 && (now - lastStoryTime) > (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                storyCount = 0;
                cooldownUntil = 0;
                localStorage.setItem('mimi_storyCount', 0);
                localStorage.setItem('mimi_cooldownUntil', 0);
            }

            // 規則二：檢查是否正在「強制休息」狀態中
            if (cooldownUntil > 0 && now < cooldownUntil) {
                event.preventDefault(); // 阻止相機開啟
                const remainingMs = cooldownUntil - now;
                const hours = Math.floor(remainingMs / (1000 * 60 * 60));
                const mins = Math.ceil((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                
                let timeMsg = hours > 0 ? `${hours} 小時 ${mins} 分鐘` : `${mins} 分鐘`;
                statusText.innerHTML = `😴 <b>噓~魔法精靈正在睡覺補充能量！</b><br>請等 ${timeMsg} 後再來找我玩喔！`;
                statusText.style.color = '#e17055';
                return;
            }

            // 規則三：檢查今天是否已經聽滿額度
            if (storyCount >= MAX_STORIES) {
                event.preventDefault(); // 阻止相機開啟
                // 觸發休息時間，開始倒數
                const newCooldown = now + (COOLDOWN_HOURS * 60 * 60 * 1000);
                localStorage.setItem('mimi_cooldownUntil', newCooldown);
                
                statusText.innerHTML = `✨ <b>已經聽完 ${MAX_STORIES} 個故事囉！</b><br>魔法精靈要去休息 ${COOLDOWN_HOURS} 小時了，晚點再來吧！掰掰！`;
                statusText.style.color = '#e17055';
                return;
            }
        });

        cameraInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            cameraLabel.style.display = 'none';
            playBtn.style.display = 'none';
            retryLoginBtn.style.display = 'none'; 
            statusText.innerText = '✨ 魔法精靈正在確認通關密語...';
            statusText.style.color = '#555';

            const formData = new FormData();
            formData.append('data', file); 
            formData.append('password', localStorage.getItem('magicPassword')); 

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // ⭐️ 成功拿到故事後，才扣除額度
                    let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
                    storyCount++;
                    localStorage.setItem('mimi_storyCount', storyCount);
                    localStorage.setItem('mimi_lastStoryTime', Date.now());

                    const remaining = MAX_STORIES - storyCount;
                    statusText.innerText = `✅ 故事寫好囉！(本次還能再聽 ${remaining} 個)`;
                    statusText.style.color = '#38ada9';
                    
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioUrl;
                    playBtn.style.display = 'block';
                } else {
                    statusText.innerText = '❌ 魔法咒語不對喔！請重新施展嘿。';
                    statusText.style.color = '#d63031';
                    localStorage.removeItem('magicPassword');
                    localStorage.removeItem('loginDate');
                    
                    cameraLabel.style.display = 'none';
                    retryLoginBtn.style.display = 'block';
                }
            } catch (error) {
                statusText.innerText = '❌ 咦~網路斷線了捏，快請爸爸幫忙檢查一下！';
                statusText.style.color = '#d63031';
                cameraLabel.style.display = 'block';
            }
        });

        retryLoginBtn.addEventListener('click', function() {
            mainScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            
            retryLoginBtn.style.display = 'none';
            cameraLabel.style.display = 'block';
            statusText.innerText = '準備好聽故事了嗎？';
            statusText.style.color = '#555';
            previewImg.style.display = 'none';
            passwordInput.value = ''; 
        });

        playBtn.addEventListener('click', function() {
            audioPlayer.play();
            playBtn.style.display = 'none'; 
            statusText.innerText = '🎶 故事播放中...';
            statusText.style.color = '#38ada9';
        });

        audioPlayer.onended = function() {
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            if (storyCount >= MAX_STORIES) {
                statusText.innerHTML = `🎉 <b>故事說完啦！</b><br>哇~你已經聽滿 ${MAX_STORIES} 個囉，請按下面的按鈕讓精靈去睡覺！`;
            } else {
                statusText.innerText = '🎉 故事說完啦！還要再拍一張嗎？';
            }
            statusText.style.color = '#ff6b6b';
            cameraLabel.style.display = 'block'; 
            previewImg.style.display = 'none';
        };
    </script>
</body>
</html>
