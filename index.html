<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法照片故事機</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 引入可愛圓潤且豐富的 Google 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Playfair+Display:wght@700;900&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* ⭐️ 關鍵修改：從 center 改成 flex-start，讓內容乖乖從上面排下來 */
            min-height: 100vh;           /* ⭐️ 確保背景至少有一個螢幕高 */
            margin: 0;
            background-image: url('whimsical_sky.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* ⭐️ 讓背景固定，萬一需要滑動時背景不會跟著跑 */
            font-family: 'Nunito', 'Arial', sans-serif;
            overflow-y: auto;            /* ⭐️ 關鍵修改：打開垂直滾動條，萬一螢幕比較小也能往下滑 */
            box-shadow: inset 0 0 100px rgba(0,0,0,0.4);
        }
        
        /* === 標題：深紅色故事書標籤框 (層次強化版) === */
        .fairytale-tag {
            background: linear-gradient(135deg, #d63031 0%, #b32323 100%);
            border: 4px solid #f9ca24; 
            border-radius: 12px;
            padding: 8px 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative; 
            z-index: 10;
        }
        
        .fairytale-tag::before, .fairytale-tag::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            border: 4px solid #f9ca24;
            border-bottom: none; border-right: none;
            top: 4px; left: 4px;
        }
        .fairytale-tag::after {
            border-top: none; border-left: none;
            border-bottom: 4px solid #f9ca24; border-right: 4px solid #f9ca24;
            bottom: 4px; right: 4px; top: auto; left: auto;
        }

        h1 { 
            color: white; 
            margin: 0; 
            text-shadow: 2px 2px 0px #8e1b1b, 0px 0px 15px rgba(255,255,255,0.4); 
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 28px;
        }
        
        /* === 登入畫面：透明背景透出魔法背景 === */
        #loginScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-image: radial-gradient(circle, rgba(255,255,255,0) 0%, rgba(0,0,0,0.2) 100%);
        }
        .login-box {
            background: #f7e8c3; 
            border: 5px solid #a3815f; 
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        input[type="text"] {
            font-size: 24px;
            padding: 15px;
            border-radius: 15px;
            border: 4px solid #f3a683; 
            text-align: center;
            width: 80%;
            margin-bottom: 25px;
            background-color: white;
            color: #333;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
        }
        
        /* === 通用按鈕樣式：魔法閃爍光芒 === */
        .story-stamp {
            color: white;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Nunito', sans-serif;
            border: 6px solid #e2af65; 
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ⭐️ 魔法閃光動畫 */
        .story-stamp::before {
            content: "";
            position: absolute;
            top: -50%; left: -150%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: shimmer 3.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* 登入按鈕：呼吸燈 */
        #loginBtn {
            background: linear-gradient(180deg, #78e08f 0%, #38ada9 100%);
            font-size: 28px;
            padding: 20px 60px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #2d8a87, 0 15px 30px rgba(0,0,0,0.3);
            text-shadow: 0 0 10px white, 0 0 15px rgba(255,242,0,0.8);
            animation: magic-breathing 2.5s ease-in-out infinite;
        }

        @keyframes magic-breathing {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 4px 0 #2d8a87, 0 0px 30px rgba(255, 242, 0, 0.6); }
            100% { transform: scale(1); }
        }

        #loginBtn:active { 
            animation: none;
            transform: scale(0.95) translateY(4px); 
            box-shadow: 0 0px 0 #2d8a87 !important;
        }

        /* === 拍照按鈕：加大且固定位置 === */
        #cameraLabel {
            background: linear-gradient(180deg, #f6e58d 0%, #f9ca24 100%);
            display: block;      
            position: relative;  
            width: 155px;        
            height: 155px;
            padding: 0;          
            border-radius: 50%;  
            font-size: 0px;      
            margin-top: 15px; 
            box-shadow: 0 10px 0 #b07d3f, 0 15px 30px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        #cameraLabel::after {
            content: '📸';       
            position: absolute;  
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            font-size: 85px;     
            line-height: 1;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2); 
        }
        
        /* 播放按鈕 */
        #playBtn {
            background: linear-gradient(180deg, #82ccdd 0%, #60a3bc 100%);
            padding: 16px 60px;
            border-radius: 50px;
            font-size: 32px;
            margin-top: 15px;
            box-shadow: 0 10px 0 #3d7e97, 0 15px 30px rgba(0,0,0,0.3);
            display: none;
        }

        /* === 主要畫面排版 === */
        #mainScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 50px;    /* ⭐️ 加大頂部留白，避開手機最上方的系統時間與瀏海 */
            padding-bottom: 40px; /* ⭐️ 底部也留一點呼吸空間 */
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* === 羊皮紙問候語：倒角 + 紅字光暈 === */
        #greetingText {
            font-size: 22px; 
            color: #d63031; 
            font-weight: 900;
            margin-bottom: 15px;
            background-image: url('parchment_seal.png'); 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            
            /* 👇 稍微縮小這邊的 padding，讓羊皮紙變扁一點點 👇 */
            padding: 40px 30px; 
            
            text-align: center;
            line-height: 1.5;
            font-family: 'Baloo 2', 'Nunito', sans-serif;
            width: 88%; 
            box-sizing: border-box; 
            border-radius: 40px; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-shadow: 
                0 0 12px rgba(255, 255, 255, 1),   
                0 0 8px rgba(255, 242, 0, 0.7),    
                1px 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        input[type="file"] { display: none; }

        /* === ⭐️ 商業級細節：拍立得照片相框 === */
        #preview {
            margin-top: 15px;
            max-width: 65%;
            max-height: 200px;
            display: none;
            padding: 12px 12px 40px 12px; /* 底部留白做拍立得效果 */
            background: white;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: rotate(-3deg); /* 微微傾斜更自然 */
            border: none;
        }

        /* === 狀態欄：磨砂玻璃質感 === */
        #status {
            margin-top: 20px;
            font-size: 19px;
            color: #d63031; 
            font-weight: 900;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 85%;
            text-shadow: 0 0 10px white;
            text-align: center;
        }
        /* === ⭐️ 新增：播放中狀態的專屬動畫 === */
        @keyframes status-pulse {
            0% { transform: scale(1); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
            50% { 
                transform: scale(1.03); 
                box-shadow: 0 0 25px rgba(56, 173, 169, 0.7); /* 發出藍綠色魔法光 */
                border-color: #38ada9;
            }
            100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        }
        
        /* 當 JavaScript 加上這個 class 時，就會啟動動畫 */
        .playing-active {
            animation: status-pulse 2s ease-in-out infinite;
            color: #38ada9 !important; /* 文字變成清爽的藍綠色 */
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="fairytale-tag">
            <h1>🔐 魔法照片故事機</h1>
        </div>
        <div class="login-box">
            <div style="font-size: 20px; color: #d63031; margin-bottom: 15px; font-weight: 900; text-shadow: 0 0 10px white;">請輸入今天的魔法咒語：</div>
            <input type="text" id="passwordInput" placeholder="輸入咒語">
            <button id="loginBtn" class="story-stamp">進入魔法相機</button>
        </div>
    </div>

    <div id="mainScreen">
        <div class="fairytale-tag">
            <h1>📸 魔法照片故事機</h1>
        </div>
        <div id="greetingText"></div>
        <label for="cameraInput" id="cameraLabel" class="story-stamp"></label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <img id="preview" src="" alt="照片預覽">
        
        <div id="status">一起來聽故事吧！</div>
        
        <button id="playBtn" class="story-stamp">▶️ 點我聽故事</button>
        <button id="retryLoginBtn" class="story-stamp" style="background: linear-gradient(180deg, #fab1a0 0%, #e17055 100%); margin-top:15px; padding:10px 25px; border-radius:30px; font-size:18px;">🔄 重新輸入魔法咒語</button>
    </div>

    <script>
        // ==========================================
        // 🛠️ 爸爸專用設定區 🛠️
        // ==========================================
        const N8N_WEBHOOK_URL = 'https://james15211521.zeabur.app/webhook/story-camera';
        const MAX_STORIES = 5;       
        const COOLDOWN_HOURS = 3;    
        // ==========================================

        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const greetingText = document.getElementById('greetingText');

        function checkLogin() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('loginDate');
            const savedPwd = localStorage.getItem('magicPassword');
            if (savedDate === today && savedPwd) { showMainScreen(); }
        }

        loginBtn.addEventListener('click', function() {
            const pwd = passwordInput.value.trim();
            
            // ⭐️ 新增：爸爸專屬的「秘密重置咒語」
            if (pwd === '0000' || pwd === 'reset') {
                localStorage.clear(); // 瞬間清除手機內所有防沉迷紀錄與密碼
                alert('🛠️ 【爸爸專屬魔法】\n所有的冷卻時間與聽故事紀錄都已經清除囉！請重新輸入給女兒的正常咒語。');
                passwordInput.value = ''; // 清空輸入框
                return; // 留在登入畫面，不進入相機
            }

            if (pwd !== '') {
                localStorage.setItem('magicPassword', pwd);
                localStorage.setItem('loginDate', new Date().toDateString());
                showMainScreen();
            }
        });

        function showMainScreen() {
            loginScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            greetingText.innerHTML = `✨魔法提示✨<br>找到...你有興趣的東西<br>按下照相機拍照`; 
        }

        checkLogin();

        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const statusText = document.getElementById('status');
        const previewImg = document.getElementById('preview');
        const playBtn = document.getElementById('playBtn');
        const retryLoginBtn = document.getElementById('retryLoginBtn'); 
        const audioPlayer = new Audio();

        cameraInput.addEventListener('click', function(event) {
            const now = Date.now();
            let cooldownUntil = parseInt(localStorage.getItem('mimi_cooldownUntil')) || 0;
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            let lastStoryTime = parseInt(localStorage.getItem('mimi_lastStoryTime')) || 0;

            if (lastStoryTime > 0 && (now - lastStoryTime) > (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                storyCount = 0; cooldownUntil = 0;
                localStorage.setItem('mimi_storyCount', 0);
                localStorage.setItem('mimi_cooldownUntil', 0);
            }

            if (cooldownUntil > 0 && now < cooldownUntil) {
                event.preventDefault(); 
                const remainingMs = cooldownUntil - now;
                const totalMins = Math.ceil(remainingMs / (1000 * 60));
                const hours = Math.floor(totalMins / 60);
                const mins = totalMins % 60;
                let timeMsg = hours > 0 ? `${hours} 小時 ${mins} 分鐘` : `${mins} 分鐘`;
                statusText.innerHTML = `😴 <b>精靈睡覺補充能量中！</b><br>等 ${timeMsg} 後再來玩喔！`;
                return;
            }

            if (storyCount >= MAX_STORIES) {
                event.preventDefault(); 
                const newCooldown = now + (COOLDOWN_HOURS * 60 * 60 * 1000);
                localStorage.setItem('mimi_cooldownUntil', newCooldown);
                statusText.innerHTML = `✨ <b>故事都講完囉！</b><br>魔法精靈休息 ${COOLDOWN_HOURS} 小時後再回來！`;
                return;
            }
        });

        cameraInput.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            cameraLabel.style.display = 'none';
            playBtn.style.display = 'none';
            retryLoginBtn.style.display = 'none'; 
            statusText.innerText = '✨ 魔法精靈正在確認通關密語...';

            const formData = new FormData();
            formData.append('data', file); 
            formData.append('password', localStorage.getItem('magicPassword')); 

            try {
                const response = await fetch(N8N_WEBHOOK_URL, { method: 'POST', body: formData });
                if (response.ok) {
                    let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
                    storyCount++;
                    localStorage.setItem('mimi_storyCount', storyCount);
                    localStorage.setItem('mimi_lastStoryTime', Date.now());
                    const remaining = MAX_STORIES - storyCount;
                    statusText.innerText = `✅ 故事寫好囉！(還能再聽 ${remaining} 個)`;
                    const audioBlob = await response.blob();
                    audioPlayer.src = URL.createObjectURL(audioBlob);
                    playBtn.style.display = 'block';
                } else {
                    statusText.innerText = '❌ 咒語不對喔！請重新施展嘿。';
                    localStorage.removeItem('magicPassword');
                    localStorage.removeItem('loginDate');
                    cameraLabel.style.display = 'none';
                    retryLoginBtn.style.display = 'block';
                }
            } catch (error) {
                statusText.innerText = '❌ 咦~網路斷線了，快請爸爸檢查！';
                cameraLabel.style.display = 'block';
            }
        });

        retryLoginBtn.addEventListener('click', function() {
            mainScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            retryLoginBtn.style.display = 'none';
            cameraLabel.style.display = 'block';
            statusText.innerText = '一起來聽故事吧！';
            previewImg.style.display = 'none';
            passwordInput.value = ''; 
        });

        playBtn.addEventListener('click', function() {
            audioPlayer.play();
            playBtn.style.display = 'none'; 
            statusText.innerText = '🎶 故事播放中...';
            /* 👇 ⭐️ 新增這行：開啟播放動畫 👇 */
            statusText.classList.add('playing-active');
        });

        audioPlayer.onended = function() {
            /* 👇 ⭐️ 新增這行：故事結束，關閉動畫 👇 */
            statusText.classList.remove('playing-active');
            
            let storyCount = parseInt(localStorage.getItem('mimi_storyCount')) || 0;
            if (storyCount >= MAX_STORIES) {
                statusText.innerHTML = `🎉 <b>故事說完啦！</b><br>今天聽滿囉，讓精靈去睡覺休息吧！`;
            } else {
                statusText.innerText = '🎉 故事說完啦！還要再拍一張嗎？';
            }
            statusText.style.color = '#ff6b6b';
            cameraLabel.style.display = 'block'; 
            previewImg.style.display = 'none';
        };
    </script>
</body>
</html>
